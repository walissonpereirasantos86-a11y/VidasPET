<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="img/f9de434b-5dcc-44ab-aa2a-0ad6f53727f3.jpg">
    <title>PetShow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top">
        <div class="logo-area">
            <img src="img/f9de434b-5dcc-44ab-aa2a-0ad6f53727f3.jpg" alt="Logo PetShow" class="logo">
            <h1 class="titulo">PetShow</h1>
        </div>

        <nav class="menu">
            <a href="#">Loja</a>
            <a href="#">Procedimentos</a>
            <a href="#">Adote um bichinho</a>
            <a href="#">Ficha dos seus pets</a>
            <a href="#">Outros serviços</a>
            <a href="#">Fale conosco</a>
        </nav>

        <div class="contato-Perfil">
            <img src="img/pngtree-message-icon-png-image_9442801.png" alt="conversas" class="contato">
            <img src="img/wall.png" alt="wall" class="wall">
            <img src="img/image.png" alt="perfil" class="perfil">
        </div>
    </header>

    <main class="main-content-wrapper">

        <aside class="consultas-hoje">
            <h3>Consultas de hoje</h3>
            <ul>
                <li>- Castração felina</li>
                <li>- Animal: Belê</li>
                <li>Hoje : 19:30 - 22:15</li>
            </ul>
            <a href="#" class="saiba-mais">saiba mais +</a>
        </aside>

        <div class="main-area">
            <section class="banner-verde">
                <p><em>“O melhor lugar para cuidar da saúde e bem estar do seu amigo de patas”</em></p>
                <p class="equipe">(Equipe.2025)</p>
                <div class="banner-logo-container">
                    <img src="img/LogPrototipo(2).png" alt="Logo PetShow Detalhado" class="banner-logo">
                    </div>
            </section>
            <section class="outras-secoes">
                </section>
        </div>

    </main>

</body>
</html>
